excluded:
  - DerivedData
  - .build

function_body_length:
  warning: 80
  error: 150

type_body_length:
  warning: 350
  error: 500

line_length:
  warning: 140

disabled_rules:
  - trailing_comma

opt_in_rules:
  - sorted_imports
  - contains_over_filter_is_empty
  - empty_count
  - force_unwrapping
  - discouraged_optional_boolean
